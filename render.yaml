services:
  - type: web
    name: blitzlord-server
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: pnpm --filter @blitzlord/server start
    envVars:
      - key: CORS_ORIGIN
        value: https://lockd0wn7.github.io
      - key: NODE_VERSION
        value: 22
